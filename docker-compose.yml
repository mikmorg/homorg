services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: homorg
      POSTGRES_PASSWORD: homorg_dev
      POSTGRES_DB: homorg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homorg"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://homorg:homorg_dev@db:5432/homorg
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production_64chars_minimum_length_here}
      LISTEN_ADDR: 0.0.0.0:8080
      STORAGE_PATH: /data/images
      RUST_LOG: homorg=debug,tower_http=debug
    volumes:
      - image_data:/data/images
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  image_data:
