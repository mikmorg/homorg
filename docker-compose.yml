services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: homorg
      POSTGRES_PASSWORD: homorg_dev
      POSTGRES_DB: homorg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homorg"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://homorg:homorg_dev@db:5432/homorg
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in environment or .env file}
      LISTEN_ADDR: 0.0.0.0:8080
      STORAGE_PATH: /data/images
      DOWNLOADS_PATH: /app/downloads
      RUST_LOG: homorg=debug,tower_http=debug
      LOG_FORMAT: ${LOG_FORMAT:-text}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-20}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-10}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - ./data/images:/data/images
      - ./downloads:/app/downloads:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
